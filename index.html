<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 2.5rem;
      max-width: 480px;
      text-align: center;
      line-height: 1.6;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <h1>Živjo, svet!</h1>
  <p>To je moja prva spletna stran, zgrajena z vibe codingom.</p>
  <button onclick="alert('Bravo! Vse deluje.')">Deluje!</button>
</body>
</html>
